<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF0F5] min-h-screen flex items-center justify-center font-sans antialiased">

<div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl shadow-pink-100 w-full max-w-md border border-pink-100/50 transform transition duration-500 hover:scale-[1.01]">

    <div class="text-center mb-8">
        <div class="w-24 h-24 bg-gradient-to-tr from-pink-300 to-rose-200 rounded-full mx-auto flex items-center justify-center shadow-inner mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-700 tracking-tight">Selamat Datang</h1>
        <p class="text-sm text-pink-400 font-medium">Halaman Dashboard Profil Kamu</p>
    </div>

    <div class="space-y-4 mb-8">
        <div class="bg-pink-50/50 p-4 rounded-2xl flex flex-col border border-pink-100/30">
            <span class="text-xs font-semibold text-pink-400 uppercase tracking-wider mb-1">Username</span>
            <span class="text-gray-700 font-medium text-base" th:text="${user.username}">-</span>
        </div>

        <div class="bg-pink-50/50 p-4 rounded-2xl flex flex-col border border-pink-100/30">
            <span class="text-xs font-semibold text-pink-400 uppercase tracking-wider mb-1">Nama Lengkap</span>
            <span class="text-gray-700 font-medium text-base" th:text="${profile.nama}">-</span>
        </div>

        <div class="bg-pink-50/50 p-4 rounded-2xl flex flex-col border border-pink-100/30">
            <span class="text-xs font-semibold text-pink-400 uppercase tracking-wider mb-1">Alamat</span>
            <span class="text-gray-700 font-medium text-base" th:text="${profile.alamat}">-</span>
        </div>
    </div>

    <div class="text-center">
        <a th:href="@{/logout}" class="inline-flex items-center justify-center px-6 py-3 w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-semibold rounded-2xl shadow-md shadow-pink-200 hover:from-pink-500 hover:to-rose-500 hover:shadow-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-pink-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Keluar Aplikasi
        </a>
    </div>

</div>

</body>
</html>
